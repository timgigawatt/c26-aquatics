<!-- @dsCard group="Components" viewport="700x180" subtitle="Audience / age pill tabs" name="Tabs" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--surface);padding:26px}
  .lbl{font-family:var(--font-subhead);font-weight:600;text-transform:uppercase;letter-spacing:var(--ls-eyebrow);font-size:11px;color:var(--text-muted);margin-bottom:12px}
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const NS = Object.values(window).find(o => o && typeof o === "object" && typeof o.Tabs === "function") || {};
    const { Tabs } = NS;
    function Demo() {
      const [seg, setSeg] = React.useState("kids");
      return (
        <div>
          <div className="lbl">Active: {seg}</div>
          <Tabs
            items={[
              {id:"kids",label:"Kids"},
              {id:"teens",label:"Teens"},
              {id:"adults",label:"Adults"},
              {id:"athletes",label:"Athletes"},
            ]}
            value={seg}
            onChange={setSeg}
          />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body></html>
