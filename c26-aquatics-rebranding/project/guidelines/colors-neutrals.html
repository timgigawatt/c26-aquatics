<!-- @dsCard group="Colors" viewport="700x170" subtitle="Neutrals — surfaces, text, lines" name="Neutrals" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--surface);padding:22px}
  .row{display:flex;gap:10px}
  .sw{flex:1;border:1px solid var(--line);border-radius:var(--r-sm);overflow:hidden}
  .chip{height:62px}
  .meta{padding:7px 9px}
  .name{font-size:11px;font-weight:700;color:var(--text-strong)}
  .hex{font-size:10px;color:var(--text-muted)}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink)"></div><div class="meta"><div class="name">Ink</div><div class="hex">#15262F</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--slate)"></div><div class="meta"><div class="name">Slate</div><div class="hex">#5D7480</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--line-strong)"></div><div class="meta"><div class="name">Line+</div><div class="hex">#B9C7CE</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--mist)"></div><div class="meta"><div class="name">Mist</div><div class="hex">#EAF0F3</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--paper)"></div><div class="meta"><div class="name">Paper</div><div class="hex">#F6F9FA</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--white);border-bottom:1px solid var(--line)"></div><div class="meta"><div class="name">White</div><div class="hex">#FFFFFF</div></div></div>
  </div>
</body></html>
