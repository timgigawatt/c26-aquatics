<!-- @dsCard group="Spacing" viewport="700x160" subtitle="Corner radii — squared actions, soft cards" name="Radii" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--surface);padding:24px}
  .row{display:flex;gap:18px}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{width:72px;height:56px;background:var(--navy-100);border:2px solid var(--navy-700)}
  .lbl{font-size:11px;color:var(--text-muted);text-align:center}
</style></head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="border-radius:var(--r-xs)"></div><div class="lbl">xs · 2px<br>buttons</div></div>
    <div class="col"><div class="box" style="border-radius:var(--r-sm)"></div><div class="lbl">sm · 4px<br>inputs</div></div>
    <div class="col"><div class="box" style="border-radius:var(--r-md)"></div><div class="lbl">md · 8px</div></div>
    <div class="col"><div class="box" style="border-radius:var(--r-lg)"></div><div class="lbl">lg · 14px<br>cards</div></div>
    <div class="col"><div class="box" style="border-radius:var(--r-xl)"></div><div class="lbl">xl · 20px</div></div>
    <div class="col"><div class="box" style="border-radius:var(--r-pill)"></div><div class="lbl">pill<br>tabs/badges</div></div>
  </div>
</body></html>
