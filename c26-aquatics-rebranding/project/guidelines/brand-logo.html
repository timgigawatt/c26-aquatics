<!-- @dsCard group="Brand" viewport="760x440" subtitle="C26 Aquatics + kraken lockups" name="Logo lockups" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--surface);padding:0}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
  .cell{padding:34px;display:flex;align-items:center;justify-content:center;min-height:200px}
  .dark{background:var(--navy-900)}
  .light{background:var(--paper)}
  /* ---- overlay lockup ---- */
  .overlay{position:relative;width:200px;height:200px;display:flex;align-items:center;justify-content:center}
  .overlay img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}
  .ov-text{position:relative;text-align:center;line-height:.82}
  .c26{font-family:var(--font-display);font-weight:800;font-size:64px;letter-spacing:-.02em}
  .c26 .o{color:var(--orange-500)}
  .aq{font-family:var(--font-subhead);font-weight:600;text-transform:uppercase;letter-spacing:.34em;font-size:15px;padding-left:.34em;margin-top:4px}
  /* ---- horizontal lockup ---- */
  .horiz{display:flex;align-items:center;gap:16px}
  .horiz img{width:74px;height:74px;object-fit:contain}
  .horiz .stack{display:flex;flex-direction:column;line-height:.82}
  .horiz .c26{font-size:40px}
  .horiz .aq{font-size:11px;letter-spacing:.3em;margin-top:3px}
  .on-dark .c26{color:#fff}.on-dark .aq{color:var(--teal-400)}
  .on-light .c26{color:var(--navy-700)}.on-light .aq{color:var(--teal-600)}
  .tag{position:absolute;top:10px;left:14px;font-family:var(--font-subhead);font-size:10px;text-transform:uppercase;letter-spacing:.12em}
  .cell{position:relative}
  .tag.d{color:rgba(255,255,255,.4)}.tag.l{color:var(--slate)}
</style></head>
<body>
  <div class="grid">
    <div class="cell dark on-dark"><span class="tag d">Overlay · dark</span>
      <div class="overlay"><img src="../assets/kraken-white.png" alt="">
        <div class="ov-text"><div class="c26">C<span class="o">26</span></div><div class="aq" style="color:var(--teal-400)">Aquatics</div></div>
      </div>
    </div>
    <div class="cell light on-light"><span class="tag l">Overlay · light</span>
      <div class="overlay"><img src="../assets/kraken-navy.png" alt="">
        <div class="ov-text"><div class="c26" style="color:var(--navy-700)">C<span class="o">26</span></div><div class="aq" style="color:var(--teal-600)">Aquatics</div></div>
      </div>
    </div>
    <div class="cell dark on-dark"><span class="tag d">Horizontal · header</span>
      <div class="horiz"><img src="../assets/kraken-white.png" alt="">
        <div class="stack"><div class="c26">C<span class="o">26</span></div><div class="aq">Aquatics</div></div>
      </div>
    </div>
    <div class="cell light on-light"><span class="tag l">Horizontal · header</span>
      <div class="horiz"><img src="../assets/kraken-navy.png" alt="">
        <div class="stack"><div class="c26">C<span class="o">26</span></div><div class="aq">Aquatics</div></div>
      </div>
    </div>
  </div>
</body></html>
