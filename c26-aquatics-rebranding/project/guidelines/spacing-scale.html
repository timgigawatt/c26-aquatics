<!-- @dsCard group="Spacing" viewport="700x150" subtitle="4px base spacing scale" name="Spacing scale" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--surface);padding:24px}
  .row{display:flex;align-items:flex-end;gap:14px}
  .col{display:flex;flex-direction:column;align-items:center;gap:6px}
  .bar{background:var(--teal-500);border-radius:2px;width:26px}
  .lbl{font-size:10px;color:var(--text-muted)}
</style></head>
<body>
  <div class="row">
    <div class="col"><div class="bar" style="height:4px"></div><div class="lbl">1·4</div></div>
    <div class="col"><div class="bar" style="height:8px"></div><div class="lbl">2·8</div></div>
    <div class="col"><div class="bar" style="height:12px"></div><div class="lbl">3·12</div></div>
    <div class="col"><div class="bar" style="height:16px"></div><div class="lbl">4·16</div></div>
    <div class="col"><div class="bar" style="height:24px"></div><div class="lbl">6·24</div></div>
    <div class="col"><div class="bar" style="height:32px"></div><div class="lbl">8·32</div></div>
    <div class="col"><div class="bar" style="height:48px"></div><div class="lbl">12·48</div></div>
    <div class="col"><div class="bar" style="height:64px"></div><div class="lbl">16·64</div></div>
    <div class="col"><div class="bar" style="height:80px"></div><div class="lbl">20·80</div></div>
  </div>
</body></html>
