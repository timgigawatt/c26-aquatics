<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--surface);padding:26px}
  .eyebrow{font-family:var(--font-subhead);font-weight:600;text-transform:uppercase;letter-spacing:var(--ls-eyebrow);font-size:12px;color:var(--teal-600);margin-bottom:8px}
  .display{font-family:var(--font-display);font-weight:800;text-transform:uppercase;font-size:76px;line-height:.92;letter-spacing:var(--ls-tight);color:var(--navy-700);margin:0}
  .display em{font-style:normal;color:var(--orange-500)}
  .spec{font-size:11px;color:var(--text-muted);margin-top:12px}
</style></head>
<body>
  <div class="eyebrow">Performance starts here</div>
  <h1 class="display">Become a<br><em>stronger</em> swimmer</h1>
  <div class="spec">Barlow Condensed · 800 · uppercase · tracking −0.02em · line-height 0.92</div>
</body></html>
