<!-- @dsCard group="Colors" viewport="700x190" subtitle="Core brand palette — navy, teal, orange" name="Brand colors" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--surface);padding:22px}
  .row{display:flex;gap:14px}
  .sw{flex:1;border-radius:var(--r-md);overflow:hidden;border:1px solid var(--line)}
  .chip{height:84px}
  .meta{padding:10px 12px}
  .name{font-family:var(--font-subhead);font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:12px;color:var(--text-strong)}
  .hex{font-size:12px;color:var(--text-muted);margin-top:2px}
  .use{font-size:11px;color:var(--text-muted);margin-top:5px}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--navy-700)"></div><div class="meta"><div class="name">Navy</div><div class="hex">#183E53</div><div class="use">Ground · headers · text</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--teal-500)"></div><div class="meta"><div class="name">Teal</div><div class="hex">#11B3AA</div><div class="use">Energy · accents · highlights</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--orange-500)"></div><div class="meta"><div class="name">Orange</div><div class="hex">#F38F1F</div><div class="use">Action · primary CTAs</div></div></div>
  </div>
</body></html>
