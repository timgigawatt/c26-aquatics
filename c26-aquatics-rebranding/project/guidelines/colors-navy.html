<!-- @dsCard group="Colors" viewport="700x150" subtitle="Navy ramp — backgrounds to hairlines" name="Navy scale" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--surface);padding:22px}
  .row{display:flex;gap:8px}
  .sw{flex:1;display:flex;flex-direction:column;gap:6px}
  .chip{height:70px;border-radius:var(--r-sm);border:1px solid rgba(0,0,0,.06)}
  .lbl{font-size:11px;color:var(--text-muted);text-align:center}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--navy-900)"></div><div class="lbl">900</div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-800)"></div><div class="lbl">800</div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-700)"></div><div class="lbl">700 ·base</div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-600)"></div><div class="lbl">600</div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-500)"></div><div class="lbl">500</div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-300)"></div><div class="lbl">300</div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-100)"></div><div class="lbl">100</div></div>
  </div>
</body></html>
