<!-- @dsCard group="Brand" viewport="700x230" subtitle="Wordmark only — for tight/inline contexts" name="Wordmark" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--surface);padding:26px;display:flex;gap:30px;align-items:center;flex-wrap:wrap}
  .mark{display:flex;flex-direction:column;line-height:.84}
  .c26{font-family:var(--font-display);font-weight:800;font-size:64px;letter-spacing:-.02em;color:var(--navy-700)}
  .c26 span{color:var(--orange-500)}
  .sub{font-family:var(--font-subhead);font-weight:600;text-transform:uppercase;letter-spacing:.34em;font-size:16px;color:var(--teal-600);margin-top:6px;padding-left:3px}
  .ondark{background:var(--navy-700);padding:22px 26px;border-radius:var(--r-lg)}
  .ondark .c26{color:#fff}
  .ondark .sub{color:var(--teal-400)}
  .note{font-size:11px;color:var(--text-muted);max-width:150px}
</style></head>
<body>
  <div class="mark"><div class="c26">C<span>26</span></div><div class="sub">Aquatics</div></div>
  <div class="ondark"><div class="mark"><div class="c26">C<span>26</span></div><div class="sub">Aquatics</div></div></div>
  <div class="note">Wordmark set in Barlow Condensed. Use standalone where the kraken mark is too small to read; otherwise prefer the full lockup.</div>
</body></html>
