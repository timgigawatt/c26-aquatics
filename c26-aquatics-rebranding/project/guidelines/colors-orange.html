<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--surface);padding:22px}
  .row{display:flex;gap:8px}
  .sw{flex:1;display:flex;flex-direction:column;gap:6px}
  .chip{height:70px;border-radius:var(--r-sm);border:1px solid rgba(0,0,0,.06)}
  .lbl{font-size:11px;color:var(--text-muted);text-align:center}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--orange-700)"></div><div class="lbl">700</div></div>
    <div class="sw"><div class="chip" style="background:var(--orange-600)"></div><div class="lbl">600</div></div>
    <div class="sw"><div class="chip" style="background:var(--orange-500)"></div><div class="lbl">500 ·base</div></div>
    <div class="sw"><div class="chip" style="background:var(--orange-400)"></div><div class="lbl">400</div></div>
    <div class="sw"><div class="chip" style="background:var(--orange-200)"></div><div class="lbl">200</div></div>
    <div class="sw"><div class="chip" style="background:var(--orange-100)"></div><div class="lbl">100</div></div>
  </div>
</body></html>
